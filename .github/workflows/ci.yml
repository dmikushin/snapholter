name: CI

# Triggers:
#   - push to default branch     → run tests, build artefact APK
#   - PR against default branch  → run tests, build artefact APK
#   - tag matching v*.*.*        → run tests, build APK, attach to a Release
#
# The same workflow file covers both CI and release because the only
# difference is one extra job that fires on `refs/tags/v*`.

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

# Cancel an in-flight run if a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JDK_VERSION: '17'
  PYTHON_VERSION: '3.11'

jobs:

  # ----------------------------------------------------------------------
  # Kotlin: 107 unit tests + lint. Reports uploaded on failure so a CI
  # red light gives the developer enough to debug locally.
  # ----------------------------------------------------------------------
  kotlin-tests:
    name: Kotlin unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      - name: Set up Android SDK (platform 34 + build-tools)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: testDebugUnitTest + lintDebug
        working-directory: snapecg-holter
        run: |
          chmod +x ./gradlew
          # gradlew is a shell stub that downloads Gradle 8.5 itself if no
          # `gradle` is on PATH. We deliberately do NOT use gradle/actions
          # /setup-gradle here because it installs the latest Gradle (9.x
          # at the time of writing), and AGP 8.2.0 requires Gradle 8.x —
          # mixing them blows up the build with "Unsupported Gradle version"
          # or worse, manifest-merger crashes.
          set -o pipefail
          ./gradlew testDebugUnitTest lintDebug --no-daemon --stacktrace 2>&1 \
            | tee build.log

      - name: Upload build log + reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-reports
          path: |
            snapecg-holter/build.log
            snapecg-holter/app/build/reports/
            snapecg-holter/app/build/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ----------------------------------------------------------------------
  # Python: connector protocol round-trip (33 tests) + EDF format (8 tests).
  # ----------------------------------------------------------------------
  python-tests:
    name: Python protocol + EDF tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: pip install -r snapecg-connector/requirements.txt

      - name: protocol tests (HMAC, AES-GCM, PairingStore, alphabet)
        working-directory: snapecg-connector
        run: python3 test_protocol.py

      - name: EDF+ format compliance
        run: python3 verify_edf_annotations.py

  # ----------------------------------------------------------------------
  # Build the release APK and publish it as a workflow artefact. Runs on
  # every push/PR so a green CI guarantees an installable APK exists.
  # On tag pushes the same APK is forwarded to the release job below.
  #
  # Signing: if SIGNING_KEYSTORE_BASE64 (and friends) are set in repo
  # secrets, the APK is signed with the project release keystore.
  # Otherwise we fall back to the debug keystore (build.gradle.kts has
  # the conditional baked in) — fine for pilot sideloading, NOT
  # acceptable for Play Store distribution.
  # ----------------------------------------------------------------------
  build-apk:
    name: Build release APK
    needs: [kotlin-tests, python-tests]
    runs-on: ubuntu-latest
    outputs:
      apk-name: ${{ steps.rename.outputs.apk-name }}
      signed:   ${{ steps.signing.outputs.signed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Configure release signing (if secrets present)
        id: signing
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d \
              > snapecg-holter/release.keystore
            cat > snapecg-holter/app/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$SIGNING_STORE_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          keyPassword=$SIGNING_KEY_PASSWORD
          EOF
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Release signing configured from repo secrets."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No SIGNING_KEYSTORE_BASE64 secret set;"
            echo "release will fall back to debug keystore signing."
          fi

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          else
            # Branch / PR build: encode commit so the APK announces its origin.
            VERSION_NAME="0.0.0-${GITHUB_SHA::7}"
          fi
          # versionCode must be a strictly-increasing integer; github.run_number
          # gives us exactly that across the lifetime of the workflow.
          echo "name=$VERSION_NAME"      >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION_NAME (versionCode ${{ github.run_number }})"

      - name: assembleRelease
        working-directory: snapecg-holter
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}"

      - name: Rename APK with version
        id: rename
        run: |
          APK_NAME="snapecg-holter-${{ steps.version.outputs.name }}.apk"
          cp snapecg-holter/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk-name=$APK_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk-name }}
          path: ${{ steps.rename.outputs.apk-name }}
          if-no-files-found: error
          retention-days: 30

  # ----------------------------------------------------------------------
  # Tag-triggered release. Picks up the APK artefact built above and
  # attaches it to a GitHub Release. generate_release_notes pulls the
  # commit subjects since the previous tag — see the conventional-
  # commits-style messages in `git log` for the resulting summary.
  # ----------------------------------------------------------------------
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4   # lets gh-release reach the tag's commit

      - name: Download APK artefact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apk.outputs.apk-name }}
          path: dist/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          # Tag like `v1.0.0-rc1` (anything with a `-`) is marked as a pre-release.
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## SnapECG Holter `${{ github.ref_name }}`

            **Release-build APK${{ needs.build-apk.outputs.signed == 'true' && ', signed with the project keystore.' || ', debug-signed (no SIGNING_KEYSTORE_BASE64 secret configured) — sideload only, not Play-Store-ready.' }}**
            Requires Android 8.0 (API 26) or newer.

            Install on a connected device with:
            ```bash
            adb install -t snapecg-holter-${{ github.ref_name }}.apk
            ```

            See the auto-generated changelog below for what's new.
